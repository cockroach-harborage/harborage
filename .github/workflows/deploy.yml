# Deprivileged two-token pipeline (ARCHITECTURE §17.3).
# Job `infra` is the ONLY holder of HB_TERRAFORM_TOKEN and runs no third-party
# package code. Job `deploy` never receives that token: it reads IDs from state
# with R2-scoped credentials and deploys with the scoped HB_DEPLOY_TOKEN.
name: deploy

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  infra:
    name: infra (tofu plan + apply)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.opentofu.org:443
            get.opentofu.org:443
            api.cloudflare.com:443
            *.r2.cloudflarestorage.com:443

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2

      - name: Render backend + tfvars
        working-directory: infra
        env:
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          ZONE_NAME: ${{ vars.ZONE_NAME }}
          ADMIN_HANDLES: ${{ vars.ADMIN_HANDLES }}
          IDP_GITHUB_CLIENT_ID: ${{ vars.IDP_GITHUB_CLIENT_ID }}
        run: |
          cat > backend.hcl <<EOF
          bucket       = "harborage-tfstate"
          key          = "harborage.tfstate"
          region       = "auto"
          endpoint     = "https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
          use_lockfile = true
          skip_credentials_validation = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          skip_metadata_api_check     = true
          skip_s3_checksum            = true
          EOF
          admin_emails=$(printf '%s' "$ADMIN_HANDLES" | awk -v RS=, '{gsub(/^[ \t]+|[ \t\n]+$/,""); if ($0!="") printf "\"%s\",", $0}')
          cat > terraform.tfvars <<EOF
          account_id   = "${CF_ACCOUNT_ID}"
          zone_name    = "${ZONE_NAME}"
          admin_emails = [${admin_emails%,}]
          github_idp_client_id = "${IDP_GITHUB_CLIENT_ID}"
          EOF

      - name: Plan and apply
        working-directory: infra
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.HB_TERRAFORM_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_STATE_SECRET_ACCESS_KEY }}
          TF_VAR_github_idp_client_secret: ${{ secrets.TF_VAR_github_idp_client_secret }}
        run: |
          tofu init -backend-config=backend.hcl -input=false
          tofu plan -input=false -out=plan.out
          tofu apply -input=false plan.out

  deploy:
    name: deploy (wrangler)
    runs-on: ubuntu-latest
    needs: infra
    environment: production
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            registry.npmjs.org:443
            nodejs.org:443
            cdn.jsdelivr.net:443
            registry.opentofu.org:443
            get.opentofu.org:443
            api.cloudflare.com:443
            *.r2.cloudflarestorage.com:443
            cockroachharborage.org:443
            console.cockroachharborage.org:443
            sparrow.cloudflare.com:443

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Inject resource IDs from state (no Terraform token here)
        env:
          CF_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_STATE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_STATE_SECRET_ACCESS_KEY }}
        working-directory: infra
        run: |
          cat > backend.hcl <<EOF
          bucket       = "harborage-tfstate"
          key          = "harborage.tfstate"
          region       = "auto"
          endpoint     = "https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
          use_lockfile = true
          skip_credentials_validation = true
          skip_region_validation      = true
          skip_requesting_account_id  = true
          skip_metadata_api_check     = true
          skip_s3_checksum            = true
          EOF
          tofu init -backend-config=backend.hcl -input=false
          KV_FLAGS_ID=$(tofu output -raw kv_flags_id)
          KV_CONFIG_ID=$(tofu output -raw kv_config_id)
          KV_I18N_ID=$(tofu output -raw kv_i18n_id)
          D1_ID=$(tofu output -raw d1_harborage_id)
          ACCESS_AUD=$(tofu output -raw access_console_aud)
          echo "::add-mask::${ACCESS_AUD}"
          for id_var in KV_FLAGS_ID KV_CONFIG_ID KV_I18N_ID D1_ID ACCESS_AUD; do
            echo "${id_var}=${!id_var}" >> "$GITHUB_ENV"
          done

      - name: Deploy console
        working-directory: apps/console
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.HB_DEPLOY_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
          ACCESS_TEAM_DOMAIN: ${{ vars.ACCESS_TEAM_DOMAIN }}
        run: |
          # Fail loudly rather than ship a bricked (fail-closed-denied) console:
          # verifyAccess builds the JWT issuer from ACCESS_TEAM_DOMAIN.
          if [ -z "${ACCESS_TEAM_DOMAIN}" ]; then
            echo "ACCESS_TEAM_DOMAIN variable is not set (Zero Trust team domain, e.g. harborage.cloudflareaccess.com)"; exit 1
          fi
          sed -i "s/REPLACE_KV_FLAGS_ID/${KV_FLAGS_ID}/; s/REPLACE_D1_ID/${D1_ID}/; s/REPLACE_ACCESS_TEAM_DOMAIN/${ACCESS_TEAM_DOMAIN}/" wrangler.jsonc
          pnpm exec wrangler deploy
          pnpm exec wrangler d1 migrations apply harborage --remote

      - name: Deploy web
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.HB_DEPLOY_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
        run: |
          sed -i "s/REPLACE_KV_FLAGS_ID/${KV_FLAGS_ID}/; s/REPLACE_KV_CONFIG_ID/${KV_CONFIG_ID}/; s/REPLACE_KV_I18N_ID/${KV_I18N_ID}/" wrangler.jsonc
          pnpm exec wrangler deploy

      - name: Set console runtime secrets
        working-directory: apps/console
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.HB_DEPLOY_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CF_ACCOUNT_ID }}
        run: |
          printf '%s' "${ACCESS_AUD}" | pnpm exec wrangler secret put ACCESS_AUD

      - name: Smoke test (public up; console never open)
        env:
          ZONE_NAME: ${{ vars.ZONE_NAME }}
        run: |
          # A freshly-created Worker Custom Domain takes a minute or two to
          # propagate DNS + issue its edge cert, so retry the public check —
          # a first-deploy propagation race must not be a false failure.
          code=000
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "https://${ZONE_NAME}/" || echo 000)
            [ "$code" = "200" ] && break
            echo "attempt $i: public returned $code; retrying in 15s"
            sleep 15
          done
          [ "$code" = "200" ] || { echo "public app returned $code after retries"; exit 1; }
          # Console check fails closed: only a 200 (reachable without Access)
          # fails; 302 (Access redirect) and 000 (not up) both pass.
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "https://console.${ZONE_NAME}/")
          [ "$code" != "200" ] || { echo "console is reachable without Access — failing closed"; exit 1; }
