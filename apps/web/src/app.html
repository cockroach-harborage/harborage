<!doctype html>
<html lang="%paraglide.locale%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="theme-color" content="#f4ebd7" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1a140c" media="(prefers-color-scheme: dark)" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- Class, not an inline style attribute: `style-src 'self'` (no
		     'unsafe-inline', no 'unsafe-hashes') blocks style attributes, and
		     losing `display: contents` here would break every page layout. -->
		<div class="app-root">%sveltekit.body%</div>
	</body>
</html>
